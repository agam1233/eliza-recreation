<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIZA (1966) - DOCTOR</title>
    <style>
        body {
            background-color: #111;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        p {
            color: #888;
            margin-bottom: 20px;
        }
        #chatbox {
            width: 100%;
            max-width: 600px;
            height: 60vh;
            border: 2px solid #33ff33;
            background-color: #000;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.2);
        }
        .message {
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .user { color: #fff; }
        .eliza { color: #33ff33; font-weight: bold; }
        .input-area {
            width: 100%;
            max-width: 600px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            background-color: #222;
            color: #fff;
            border: 1px solid #33ff33;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            background-color: #333;
        }
        button {
            background-color: #33ff33;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover {
            background-color: #2ce62c;
        }
    </style>
</head>
<body>

    <h1>ELIZA</h1>
    <p>The original 1966 DOCTOR script</p>

    <div id="chatbox">
        <div class="message eliza">ELIZA: How do you do. Please tell me your problem.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off" autofocus>
        <button id="sendBtn">Send</button>
    </div>

    <script>
        // Security: Prevent XSS by escaping HTML entities
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Pronoun reflections
        const reflections = {
            "am": "are", "was": "were", "i": "you", "i'd": "you would", "i've": "you have", 
            "i'll": "you will", "my": "your", "are": "am", "you've": "I have", "you'll": "I will", 
            "your": "my", "yours": "mine", "you": "me", "me": "you", "myself": "yourself"
        };

        // Classic DOCTOR script patterns and responses
        const elizaKeywords = [
            [/I need (.*)/i, [
                "Why do you need {0}?", "Would it really help you to get {0}?", "Are you sure you need {0}?"
            ]],
            [/Why don\'?t you (.*)/i, [
                "Do you really believe I don't {0}?", "Perhaps I will {0} in good time.", "Should you {0} yourself?"
            ]],
            [/Why can\'?t I (.*)/i, [
                "Do you think you should be able to {0}?", "If you could {0}, what would you do?", "I don't know -- why can't you {0}?"
            ]],
            [/I can\'?t (.*)/i, [
                "How do you know you can't {0}?", "Perhaps you could {0} if you tried.", "What would it take for you to {0}?"
            ]],
            [/I am (.*)/i, [
                "Did you come to me because you are {0}?", "How long have you been {0}?", "How do you feel about being {0}?"
            ]],
            [/I\'?m (.*)/i, [
                "How does being {0} make you feel?", "Do you enjoy being {0}?", "Why do you tell me you're {0}?"
            ]],
            [/Are you (.*)/i, [
                "Why does it matter whether I am {0}?", "Would you prefer it if I were not {0}?", "Perhaps you believe I am {0}."
            ]],
            [/What (.*)/i, [
                "Why do you ask?", "How would an answer to that help you?", "What do you think?"
            ]],
            [/How (.*)/i, [
                "How do you suppose?", "Perhaps you can answer your own question.", "What is it you're really asking?"
            ]],
            [/Because (.*)/i, [
                "Is that the real reason?", "What other reasons come to mind?", "Does that reason apply to anything else?"
            ]],
            [/(.*) sorry (.*)/i, [
                "There are many times when no apology is needed.", "What feelings do you have when you apologize?"
            ]],
            [/Hello(.*)/i, [
                "Hello... I'm glad you could drop by today.", "Hi there... how are you today?", "Hello, how are you feeling today?"
            ]],
            [/I think (.*)/i, [
                "Do you doubt {0}?", "Do you really think so?", "But you're not sure {0}?"
            ]],
            [/(.*) friend (.*)/i, [
                "Tell me more about your friends.", "When you think of a friend, what comes to mind?", "Why don't you tell me about a childhood friend?"
            ]],
            [/Yes/i, [
                "You seem quite positive.", "You are sure.", "I see, understand."
            ]],
            [/(.*) computer(.*)/i, [
                "Are you talking about me?", "Does it seem strange to talk to a computer?", "How do computers make you feel?", "Do you feel threatened by computers?"
            ]],
            [/Is it (.*)/i, [
                "Do you think it is {0}?", "Perhaps it's {0} -- what do you think?", "If it were {0}, what would you do?"
            ]],
            [/It is (.*)/i, [
                "You seem very certain.", "If I told you that it probably isn't {0}, what would you feel?"
            ]],
            [/Can you (.*)/i, [
                "What makes you think I can't {0}?", "If I could {0}, then what?", "Why do you ask if I can {0}?"
            ]],
            [/Can I (.*)/i, [
                "Perhaps you don't want to {0}.", "Do you want to be able to {0}?", "If you could {0}, would you?"
            ]],
            [/You are (.*)/i, [
                "Why do you think I am {0}?", "Does it please you to think that I'm {0}?", "Perhaps you would like me to be {0}.", "You're really talking about yourself, aren't you?"
            ]],
            [/You\'?re (.*)/i, [
                "Why do you say I am {0}?", "Why do you think I am {0}?", "Are we talking about you, or me?"
            ]],
            [/I don\'?t (.*)/i, [
                "Don't you really {0}?", "Why don't you {0}?", "Do you want to {0}?"
            ]],
            [/I feel (.*)/i, [
                "Good, tell me more about these feelings.", "Do you often feel {0}?", "When do you usually feel {0}?", "When you feel {0}, what do you do?"
            ]],
            [/I have (.*)/i, [
                "Why do you tell me that you've {0}?", "Have you really {0}?", "Now that you have {0}, what will you do next?"
            ]],
            [/I would (.*)/i, [
                "Could you explain why you would {0}?", "Why would you {0}?", "Who else knows that you would {0}?"
            ]],
            [/Is there (.*)/i, [
                "Do you think there is {0}?", "It's likely that there is {0}.", "Would you like there to be {0}?"
            ]],
            [/My (.*)/i, [
                "I see, your {0}.", "Why do you say that your {0}?", "When your {0}, how do you feel?"
            ]],
            [/(.*)\?/i, [
                "Why do you ask that?", "Please consider whether you can answer your own question.", "Perhaps the answer lies within yourself.", "Why don't you tell me?"
            ]],
            [/(.*)/i, [
                "Please tell me more.", "Let's change focus a bit... Tell me about your family.", "Can you elaborate on that?", "Why do you say that {0}?", "I see.", "Very interesting.", "{0}.", "I see. And what does that tell you?", "How does that make you feel?", "How do you feel when you say that?"
            ]]
        ];

        // Reflect words in a string
        function reflect(str) {
            let words = str.toLowerCase().split(/\s+/);
            for (let i = 0; i < words.length; i++) {
                if (reflections[words[i]]) {
                    words[i] = reflections[words[i]];
                }
            }
            return words.join(' ');
        }

        // Get ELIZA's response
        function getResponse(userInput) {
            let text = userInput.trim().replace(/[.,!]/g, '');
            if (text === "") return "Please go on.";

            for (let i = 0; i < elizaKeywords.length; i++) {
                const pattern = elizaKeywords[i][0];
                const responses = elizaKeywords[i][1];
                const match = text.match(pattern);

                if (match) {
                    let response = responses[Math.floor(Math.random() * responses.length)];
                    if (response.includes('{0}') && match[1]) {
                        let reflected = reflect(match[1]);
                        response = response.replace('{0}', reflected);
                    }
                    return response;
                }
            }
            return "I am not sure I understand you fully.";
        }

        // Handle DOM updates
        const chatbox = document.getElementById('chatbox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            // Use escapeHTML to keep it internet-safe
            div.innerHTML = `${sender}: ${escapeHTML(text)}`;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function handleSend() {
            const text = userInput.value;
            if (text.trim() === "") return;
            
            addMessage('YOU', text);
            userInput.value = '';
            
            // Slight delay to simulate processing
            setTimeout(() => {
                const reply = getResponse(text);
                addMessage('ELIZA', reply);
            }, 600);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleSend();
            }
        });
    </script>
</body>
</html>
